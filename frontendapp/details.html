<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVE Details</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/details.css">
</head>
<body class="bg-custom text-light">

  <!-- Navbar placeholder -->
  <div id="navbar-container"></div>
  
  <div class="container-fluid my-4 ">
    <h3 class="text-center mb-4 text-light "><b>Vulnerability Details</b></h3>
    <div id="details-container" class="card p-4 shadow">
      Loading details...

    </div>
    <div class="text-center mt-3 ">
    <button id="download-btn" class="btn btn-light">
      <i class="bi bi-download"></i> Download Report
    </button>
  </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/details.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script>
    // Load navbar
    fetch("components/navbar.html")
      .then(res => res.text())
      .then(html => document.getElementById("navbar-container").innerHTML = html);

   
  </script>
</body>
</html>
