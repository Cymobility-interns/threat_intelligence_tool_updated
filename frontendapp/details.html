<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVE Details</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- <link rel="stylesheet" href="assets/css/navbar.css"> -->
  <link rel="stylesheet" href="assets/css/details.css">
</head>
<body class="bg-custom text-light">

  <!-- Navbar placeholder -->
  <div id="navbar"></div>
  
  <div class="container-fluid my-4 ">
    <!-- <h3 class="text-center mb-4 text-light "><b>Vulnerability Details</b></h3> -->
     <div class="d-flex align-items-center justify-content-center position-relative mb-4">
      <!-- Back Button -->
      <button 
        class="btn btn-outline-light rounded-circle position-absolute start-0 d-flex align-items-center justify-content-center"
      style="width: 40px; height: 40px; border: 2px solid #55dddd;"
      onclick="goBack()"
      >
        <i class="bi bi-arrow-left" style="font-size: 1.4rem; font-weight: bold;"></i>
      </button>

      <!-- Title -->
      <h2 class="text-center mb-0"><b>Vulnerability Details</b></h2>
    </div>

    <div id="details-container" class="card p-4 shadow">
      Loading details...

    </div>
    <div class="text-center mt-2 ">
    <button id="download-btn" class="btn btn-light">
      <i class="bi bi-download"></i> Download Report
    </button>
  </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/api.js"></script>
  <script type="module" src="assets/js/details.js"></script>
  <script type="module" src="assets/js/protected.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- load navbar helper script normally (must be available before calling initNavbar) -->
  <script src="components/navbar.js"></script>
  
  <script>
    fetch("components/navbar.html", { cache: 'no-store' })
      .then(res => res.ok ? res.text() : Promise.reject(res.status))
      .then(html => {
        document.getElementById("navbar").innerHTML = html;
        // NOW call the initializer defined in navbar.js
        if (typeof window.initNavbar === 'function') window.initNavbar();
        else console.warn('initNavbar not found — ensure components/navbar.js is loaded.');
      })
      .catch(err => console.error('Failed to load navbar:', err));

    function goBack() {
      const source = sessionStorage.getItem('lastSource');

      if (source === 'ledger') {
        const page = sessionStorage.getItem('ledgerCurrentPage') || 1;
        window.location.href = `ledger.html?page=${page}`;
      } 
      else if (source === 'branddetails') {
        const page = sessionStorage.getItem('branddetailsCurrentPage') || 1;
        const brand = sessionStorage.getItem('brandName') || '';
        window.location.href = `branddetails.html?brand=${encodeURIComponent(brand)}&page=${page}`;
      } 
      else {
        window.history.back(); // fallback
      }
    }
  </script>
  
</body>
</html>
