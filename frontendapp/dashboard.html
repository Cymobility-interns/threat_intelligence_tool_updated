  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence Tool</title>

    <link rel="icon" href="assets/images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
      body { font-family: 'Poppins', sans-serif; }
      .navbar-custom { background-color: #00003B; padding: 0.5rem 1rem; }
      .navbar-brand img { height: 40px; }
      .nav-link { color: white; font-weight: 600; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background-color 0.3s; margin: 0 0.3rem; }
      .nav-link:hover { color: #55dddd; }
      .navbar-toggler { border: none; }
      .navbar-toggler-icon { filter: invert(1); }

      /* User section */
      #userSection { position: relative; display: none; }
      #userIcon { font-size: 1.5rem; color: white; cursor: pointer; margin-left: 0.5rem; }
      #userIcon:hover { color: #55dddd; }
      #userDropdown { 
        position: absolute; 
        top: 40px; 
        right: 0; 
        display: none; 
        z-index: 1000; 
        background: #00003B; 
        padding: 0.5rem 1rem; 
        border-radius: 0.5rem;
        white-space: nowrap;
        text-align: left;
        margin-top: 1rem;
      }

      #userDropdown span,
      #userDropdown a {
        display: block;   /* stacked vertically */
        width: 100%;
      }
      #userDropdown span {
        color: white;
        margin-bottom: 0.5rem;
      }
      #userDropdown a {
        text-align: left;
      }

    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="#">
          <img src="assets/images/logo.png" alt="Logo">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav align-items-center">
            <li class="nav-item">
              <a class="nav-link" id="ledgerLink" href="ledger.html">Attack Ledger</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="brandsLink" href="brand.html">Brands</a>
            </li>
            <li class="nav-item" id="loginLink">
              <a class="nav-link" href="login.html">Login</a>
            </li>

            <li class="nav-item position-relative" id="userSection">
              <i class="fas fa-user" id="userIcon"></i>
              <div id="userDropdown">
                <span id="userName" class="d-block mb-2"></span>
                <a href="#" class="btn btn-danger btn-sm d-block" id="logoutBtn">
                  <i class="fas fa-right-from-bracket"></i> Logout
                </a>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { API_BASE } from "./assets/js/api.js";

      document.addEventListener("DOMContentLoaded", () => {
        const userIcon = document.getElementById('userIcon');
        const userDropdown = document.getElementById('userDropdown');
        const logoutBtn = document.getElementById('logoutBtn');
        const userName = document.getElementById('userName');

        // Toggle dropdown
        userIcon.addEventListener('click', () => {
          userDropdown.style.display = userDropdown.style.display === 'block' ? 'none' : 'block';
        });

        // Hide dropdown if clicked outside
        document.addEventListener('click', (e) => {
          if (!userDropdown.contains(e.target) && !userIcon.contains(e.target)) {
            userDropdown.style.display = 'none';
          }
        });

        // Logout
        logoutBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          const response = await fetch(`${API_BASE}/logout`, { method: "POST", credentials: "include" });
          if (response.ok) window.location.href = "dashboard.html";
        });

        // Check session and update navbar
        checkAuthAndUpdateNavbar();

        async function checkAuthAndUpdateNavbar() {
          const response = await fetch(`${API_BASE}/me`, { credentials: "include" });
          if (response.ok) {
            const user = await response.json();
            document.getElementById("loginLink").style.display = "none";
            document.getElementById("userSection").style.display = "block";
            userName.innerText = user.name; // appears only in dropdown
          } else {
            document.getElementById("loginLink").style.display = "block";
            document.getElementById("userSection").style.display = "none";
            document.getElementById("ledgerLink").href = "login.html?next=ledger.html";
            document.getElementById("brandsLink").href = "login.html?next=brand.html";
          }
        }
      });
    </script>
  </body>
  </html>
