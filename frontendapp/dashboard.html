<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threat Intelligence Tool</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    .navbar-custom {
      background-color: #00003B;
      padding: 0.5rem 1rem;
    }

    .navbar-brand img {
      height: 40px;
    }

    /* Navbar links styling */
    .nav-link {
      color: white !important;
      font-weight: 500;
      padding: 0.5rem 1rem; /* add space inside link */
      border-radius: 0.5rem;
      transition: background-color 0.3s;
      margin: 0 0.3rem; /* space between links */
    }

    .nav-link:hover {
      color: white !important;
      background-color: #55dddd; /* sky blue background */
    }

    .navbar-toggler {
      border: none;
    }

    .navbar-toggler-icon {
      filter: invert(1);
    }

    /* User icon styling */
    .user-icon {
      font-size: 1.5rem;
      color: white;
      cursor: pointer;
      position: relative;
      margin-left: 0.5rem;
    }

    .logout-btn {
      position: absolute;
      top: 40px; 
      right: 0;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <!-- Logo -->
      <a class="navbar-brand text-white fw-bold" href="#">
        <img src="assets/images/logo.png" alt="Logo">
      </a>

      <!-- Hamburger -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Links -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item">
            <a class="nav-link active" href="#">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Attack Ledger</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Brands</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Log In</a>
          </li>

          <!-- User Icon -->
          <li class="nav-item position-relative">
            <i class="fas fa-user user-icon" onclick="toggleLogout()"></i>
            <a href="#" class="btn btn-danger logout-btn" id="logoutBtn">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function toggleLogout() {
      const btn = document.getElementById('logoutBtn');
      btn.style.display = btn.style.display === 'block' ? 'none' : 'block';
    }

    // Hide logout if clicked outside
    document.addEventListener('click', function(event) {
      const btn = document.getElementById('logoutBtn');
      const icon = document.querySelector('.user-icon');
      if (!icon.contains(event.target) && !btn.contains(event.target)) {
        btn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
