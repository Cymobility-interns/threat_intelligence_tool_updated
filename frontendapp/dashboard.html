<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threat Intelligence Tool</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="stylesheet" href="assets/css/dashboard.css">

</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="#">
        <img src="assets/images/logo.png" alt="Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="ledger.html">Attack Ledger</a></li>
          <li class="nav-item"><a class="nav-link" href="brand.html">Brands</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Log In</a></li>
          <li class="nav-item position-relative">
            <i class="fas fa-user user-icon" onclick="toggleLogout()"></i>
            <a href="#" class="btn btn-danger logout-btn" id="logoutBtn">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
 <div class="dashboard-content" style="display: flex; gap: 50px; margin: 50px;">
  
  <!-- Left Column: Button + Pie Chart -->
  <div id="left-section" style="flex: 1; display: flex; flex-direction: column; align-items: center;">
    

    <div id="chart-section" style=" width: 350px; height: 350px;">
      <canvas id="interfaceChart"></canvas>
    </div>

     <div id="linechart-section" style="margin-top: -5px; width: 500px; height: 300px;">
  <canvas id="yearlyChart"></canvas>
</div>


   
  </div>

  <!-- Right Column: Recent Attacks -->
  <div id="recent-attacks" style="flex: 1; display: flex; flex-direction: column;">

    <div id="next">
      Brand Vulnerabilities &nbsp;&nbsp;
      <button id="click">
        <a href="brand.html">Click here</a>
      </button>
    </div>


    <h3 style="margin-bottom: 15px;">Recent Attacks</h3>
    <ul id="attack-list" style="margin-bottom: 20px;"></ul>

    <!-- Read More button -->
    <div id="read">
      <button id="more">
        <a href="ledger.html">Read More</a>
      </button>
    </div>
  </div>

</div>



  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Dashboard JS -->
  <script type="module" src="assets/js/dashboard.js"></script>

  <script>
    function toggleLogout() {
      const btn = document.getElementById('logoutBtn');
      btn.style.display = btn.style.display === 'block' ? 'none' : 'block';
    }
    document.addEventListener('click', function(event) {
      const btn = document.getElementById('logoutBtn');
      const icon = document.querySelector('.user-icon');
      if (!icon.contains(event.target) && !btn.contains(event.target)) btn.style.display = 'none';
    });
  </script>
</body>
</html>
