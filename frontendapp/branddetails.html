<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/branddetails.css">
  <link rel="stylesheet" href="assets/css/ledger.css">

  <style>
    /* Back button styling */
    .back-btn {
      position: fixed;
      left: 15px;
      top: 85px; /* Adjust according to navbar height */
      width: 42px;
      height: 42px;
      border: 2px solid #55dddd;
      border-radius: 50%;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      opacity: 1;
      transform: translateY(0);
      transition: all 0.25s ease-in-out;
    }

    .back-btn i {
      font-size: 1.4rem;
      font-weight: bold;
    }

    .back-btn:hover {
      background-color: #55dddd;
      color: black
    }

  </style>

</head>
<body class="bg-white text-dark">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Back Button -->
  <button class="back-btn" onclick="goBackFromBrandDetails()">
    <i class="bi bi-arrow-left"></i>
  </button>


  <!-- Brand Logo -->
  <div class="text-center my-4">
    <img id="brand-logo" class="brand-logo" src="" alt="Brand Logo">
  </div>

  <!-- Vulnerabilities Table Section -->
  <div class="d-flex justify-content-end align-items-center my-3 position-relative">
    <!-- Centered heading -->
    <h3 class="text-white text-center mb-0 position-absolute start-50 translate-middle-x">
      Vulnerabilities
    </h3>

    <!-- Text before button -->
  <span class="text-white me-2 fw-semibold me-3" style="font-size: 1.1rem;">Get Reports</span>

    <!-- Button stays at right -->
    <button id="download-selected" class="btn btn-outline-info rounded-circle" title="Download Selected">
      <i class="bi bi-download fs-4" style="text-shadow: 0 0 1px currentColor;"></i>
    </button>
  </div>


    <div class="table-responsive">
      <table class="table table-dark align-middle">
        <thead>
          <tr>
            <!-- Select All Checkbox -->
            <th scope="col">
              <input type="checkbox" id="select-all">
            </th>
            <th scope="col">Identifier</th>
            <th scope="col">Attack Title</th>
            <th scope="col">Published Date</th>
          </tr>
        </thead>
        <tbody id="vuln-table-body">
          <!-- Filled dynamically -->
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <nav>
      <ul id="pagination" class="pagination justify-content-center"></ul>
    </nav>

    <!-- Empty State -->
    <div id="empty-state" class="text-center text-white" style="display:none;">
      No vulnerabilities found for this brand.
    </div>
  </div>


  <!-- Scripts -->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
   <!-- jsPDF + AutoTable first -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <!-- load navbar helper script normally (must be available before calling initNavbar) -->
  <script src="components/navbar.js"></script>

  <script>
    fetch("components/navbar.html", { cache: 'no-store' })
      .then(res => res.ok ? res.text() : Promise.reject(res.status))
      .then(html => {
        document.getElementById("navbar").innerHTML = html;
        // NOW call the initializer defined in navbar.js
        if (typeof window.initNavbar === 'function') window.initNavbar();
        else console.warn('initNavbar not found — ensure components/navbar.js is loaded.');
      })
      .catch(err => console.error('Failed to load navbar:', err));

    function goBackFromBrandDetails() {
      const source = sessionStorage.getItem('branddetailsSource');

      if (source === 'brand') {
        window.location.href = 'brand.html';
      } 
      else if (source === 'tier1') {
        window.location.href = 'tier1.html';
      } 
      else {
        // fallback in case user opens directly
        window.location.href = 'company.html';
      }
    }
  </script>
  
  <script type="module" src="assets/js/api.js"></script>
  <script type="module" src="assets/js/ledger.js"></script>
  <script type="module" src="assets/js/branddetails.js"></script>
</body>
</html>
