<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/branddetails.css">
  <link rel="stylesheet" href="assets/css/ledger.css"><!-- reuse table styles -->
</head>
<body class="bg-white text-dark">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Brand Logo -->
  <div class="text-center my-4">
    <img id="brand-logo" class="brand-logo" src="" alt="Brand Logo">
  </div>

  <!-- Vulnerabilities Table -->
  <div class="container-fluid my-2 px-3">
    <h3  class="text-center my-4 text-white">Vulnerabilities</h3>
    <div class="table-responsive">
      <table class="table table-dark align-middle text-center">
        <thead>
          <tr>
            <th scope="col">Identifier</th>
            <th scope="col">Attack Title</th>
            <th scope="col">Published Date</th>
          </tr>
        </thead>
        <tbody id="vuln-table-body">
          <!-- Filled dynamically -->
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <nav>
      <ul id="pagination" class="pagination justify-content-center mt-3"></ul>
    </nav>

    <!-- Empty State -->
    <div id="empty-state" class="text-center text-muted text-white" style="display:none;">
      No vulnerabilities found for this brand.
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // Load Navbar
    fetch("components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });
  </script>
  <script type="module" src="assets/js/api.js"></script>
  <script type="module" src="assets/js/ledger.js"></script>
  <script type="module" src="assets/js/branddetails.js"></script>
</body>
</html>
