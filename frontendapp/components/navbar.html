<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
        font-family: 'Poppins', sans-serif; 
    }
    .navbar-custom {
      background-color: #04044b; /* dark blue background */
      padding: 0.5rem 2rem;      /* space left & right */
    }
    .navbar-brand img {
      height: 40px; /* adjust logo size */
    }
    .menu-toggle {
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      font-size: 1.4rem;   /* bigger text */
      font-weight: 600;    /* bold text */
      cursor: pointer;
    }
    .menu-toggle i {
      margin-right: 6px; /* space between icon & text */
      font-size: 1.6rem;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-custom d-flex justify-content-between align-items-center">
    <!-- Logo (shifted slightly right by padding in navbar) -->
    <a class="navbar-brand text-white fw-bold" href="#">
      <img src="assets/images/logo.png" alt="Logo"> 
    </a>

    <!-- Menu on right -->
    <div class="dropdown me-4"> <!-- 'me-4' moves it a bit left from edge -->
      <div class="menu-toggle" id="menuDropdown" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-list"></i> Menu
      </div>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="home.html">Home</a></li>
        <li><a class="dropdown-item" href="about.html">About</a></li>
        <li><a class="dropdown-item" href="services.html">Services</a></li>
        <li><a class="dropdown-item" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
