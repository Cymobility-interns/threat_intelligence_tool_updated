<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
        font-family: 'Poppins', sans-serif; 
    }
    .navbar-custom {
      background-color: #00003B; /* dark blue background */
      padding: 0.5rem 2rem;      /* space left & right */
    }
    .navbar-brand img {
      height: 40px; /* adjust logo size */
    }
    .menu-toggle {
      color: white;
      font-size: 1.4rem;   /* bigger text */
      font-weight: 600;    /* bold text */
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .menu-toggle i {
      margin-right: 6px; /* space between icon & text */
      font-size: 1.6rem;
    }

    /* Dropdown customization */
    .dropdown-menu {
      background-color: #AFFBF7 !important;  /* dropdown background */
      border: none;              
      border-radius: 0.5rem;    
      min-width: 150px;  
      margin-top: 1rem !important;  
      box-shadow: none !important;    
      margin-right: -30px;
    }
    .dropdown-item {
      color: #00003B !important;   
      font-weight: 500;
    }
    .dropdown-item:hover,
    .dropdown-item:focus {
      background-color: transparent !important; /* disable hover effect */
      color: #00003B !important;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-custom d-flex justify-content-between align-items-center">
    <!-- Logo (shifted slightly right by padding in navbar) -->
    <a class="navbar-brand text-white fw-bold" href="#">
      <img src="assets/images/logo.png" alt="Logo"> 
    </a>

    <!-- Search bar (right aligned) -->
    <div class="search-container flex-grow-1 d-flex justify-content-center">
      <!-- The search bar will be injected here dynamically -->
      <div id="search-wrapper"></div>
    </div>

    <!-- Menu on right -->
    <div class="dropdown me-4"> <!-- 'me-4' moves it a bit left from edge -->
      <div class="menu-toggle" id="menuDropdown" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-list"></i> Menu
      </div>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
        <li><a class="dropdown-item" href="ledger.html">Attack Ledger</a></li>
        <li><a class="dropdown-item" href="brand.html">Brands</a></li>
        <!-- <li><a class="dropdown-item" href="contact.html">Contact</a></li> -->
      </ul>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
