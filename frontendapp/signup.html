<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Threat Intelligence</title>
  <link rel="stylesheet" href="assets/css/signup.css">
  <link rel="icon" href="assets/images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/signup.css">
</head>
<body>
  <!-- Logo outside the container -->
  <div class="text-center mt-4">
    <img src="assets/images/logo.png" alt="Logo" class="logo">
  </div>

  <!-- Signup container -->
  <div class="signup-container">
    <h2>Threat Intelligence</h2>
    <p class="mb-4">Create your account</p>
    <form id="signupForm">
      <input type="text" name="name" placeholder="Name" class="form-control mb-2" required>
      <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
      <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
      <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control mb-3" required>
      <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
    <p class="mt-3">Already a user? <a href="login.html">Login here</a></p>
    <div id="signupMessage" class="mt-3"></div>
  </div>
  <script type="module" src="assets/js/signup.js"></script>
</body>

</html>
