<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Threat Intelligence</title>
  <link rel="icon" href="assets/images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
  <!-- Logo outside the container -->
  <div class="text-center mt-4">
    <img src="assets/images/logo.png" alt="Logo" class="logo">
  </div>

  <!-- Login container -->
  <div class="overlay">
  <div class="login-container">
    <h2>Threat Intelligence</h2>
    <p class="mb-4">Login to your account</p>
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" name="username" placeholder="Username" class="form-control" required>
      </div>

      <div class="mb-3 position-relative">
        <input type="password" name="password" placeholder="Password" class="form-control" id="loginPassword" required>
        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 toggle-password d-none" data-target="loginPassword"></i>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3">Forgot password? <a href="#">Click here to reset</a></p>
    <p>Don’t have an account? <a href="signup.html">Register here</a></p>
    <div id="loginMessage" class="mt-3"></div>
  </div>
  </div>

  <script type="module" src="assets/js/login.js"></script>
</body>

</html>
